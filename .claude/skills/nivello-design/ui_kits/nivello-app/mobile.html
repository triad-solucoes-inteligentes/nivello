<!-- @dsCard group="Nivello App" viewport="440x920" name="Nivello — Mobile" subtitle="Bottom nav, listas em cards, FAB e quote builder em etapas" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nivello — Mobile</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script src="data.js"></script>
<style>
  html,body{margin:0;height:100%;background:var(--neutral-200);display:flex;align-items:center;justify-content:center;font-family:var(--font-sans)}
  .phone{position:relative;width:390px;height:844px;background:var(--surface-page);border-radius:40px;overflow:hidden;box-shadow:0 30px 70px -20px rgba(16,23,28,.5);border:10px solid #10171c}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column}
  .scroll{flex:1;overflow-y:auto;padding:16px 14px 90px}
  .mhead{padding:16px 16px 12px;background:var(--surface-card);border-bottom:1px solid var(--border-subtle)}
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:130px;height:26px;background:#10171c;border-radius:0 0 16px 16px;z-index:20}
  ::-webkit-scrollbar{width:0}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const NS = window.NivelloDesignSystem_c06109;
const { Icon, BottomNav, MobileListItem, Avatar, Badge, MetricCard, QuoteStatusBadge, DeadlineIndicator, CreateFAB, Drawer, MobileQuoteBuilder, SearchBar, ProductTypeBadge } = NS;
const D = window.NivelloData; const money = D.money;

function Mobile(){
  const [tab, setTab] = React.useState("home");
  const [fabOpen, setFabOpen] = React.useState(false);
  const [builder, setBuilder] = React.useState(false);

  const Home = () => (
    <>
      <div className="mhead">
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{width:30,height:30,borderRadius:9,background:"linear-gradient(160deg,var(--teal-400),var(--teal-700))",display:"inline-flex",alignItems:"center",justifyContent:"center"}}><Icon name="droplet" style={{width:16,height:16,color:"#fff"}}></Icon></span>
          <span style={{fontSize:19,fontWeight:700,letterSpacing:"-.02em",color:"var(--text-strong)"}}>Nivello</span>
          <span style={{marginLeft:"auto"}}><Avatar name={D.user.name} size="sm" /></span>
        </div>
      </div>
      <div className="scroll">
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
          <MetricCard icon="file-text" label="Orçamentos" value={D.quotes.length} />
          <MetricCard icon="hard-hat" tone="accent" label="Obras ativas" value="1" />
        </div>
        <div style={{fontSize:13,fontWeight:600,textTransform:"uppercase",letterSpacing:".05em",color:"var(--text-muted)",margin:"6px 2px 8px"}}>Próximos prazos</div>
        <div style={{background:"var(--surface-card)",border:"1px solid var(--border-subtle)",borderRadius:"var(--radius-lg)",overflow:"hidden"}}>
          {D.works.filter(w=>w.status!=="concluida").slice(0,3).map((w,i,a)=>(
            <div key={w.id} style={{borderBottom:i<a.length-1?"1px solid var(--border-subtle)":"none"}}>
              <MobileListItem icon="hard-hat" iconTone={w.status==="atrasada"?"accent":"brand"} title={w.name} subtitle={w.clientName} trailing={<DeadlineIndicator date={w.deadline} size="sm" />} onClick={()=>{}} showChevron={false} />
            </div>))}
        </div>
        <div style={{fontSize:13,fontWeight:600,textTransform:"uppercase",letterSpacing:".05em",color:"var(--text-muted)",margin:"18px 2px 8px"}}>Últimos orçamentos</div>
        <div style={{background:"var(--surface-card)",border:"1px solid var(--border-subtle)",borderRadius:"var(--radius-lg)",overflow:"hidden"}}>
          {D.quotes.slice(0,4).map((q,i,a)=>(
            <div key={q.id} style={{borderBottom:i<a.length-1?"1px solid var(--border-subtle)":"none"}}>
              <MobileListItem icon="file-text" title={q.clientName} subtitle={"Nº "+q.number+" · "+q.date}
                trailing={<div style={{textAlign:"right"}}><div style={{fontFamily:"var(--font-mono)",fontWeight:700,fontSize:14,color:"var(--text-strong)"}}>R$ {money(q.total)}</div><div style={{marginTop:4}}><QuoteStatusBadge status={q.status} size="sm" showIcon={false} /></div></div>} onClick={()=>{}} showChevron={false} />
            </div>))}
        </div>
      </div>
    </>
  );

  const Clientes = () => (
    <>
      <div className="mhead"><div style={{fontSize:20,fontWeight:700,color:"var(--text-strong)",marginBottom:12}}>Clientes</div><SearchBar placeholder="Buscar cliente…" /></div>
      <div className="scroll" style={{padding:"8px 0 90px"}}>
        <div style={{background:"var(--surface-card)"}}>
          {D.clients.map((c,i,a)=>(
            <div key={c.id} style={{borderBottom:i<a.length-1?"1px solid var(--border-subtle)":"none"}}>
              <MobileListItem avatar={<Avatar name={c.name} square />} title={c.name} subtitle={c.address} meta={<><span>{c.works} obras</span><span>{c.quotes} orçamentos</span></>} onClick={()=>{}} />
            </div>))}
        </div>
      </div>
    </>
  );

  const Orcamentos = () => (
    <>
      <div className="mhead"><div style={{fontSize:20,fontWeight:700,color:"var(--text-strong)"}}>Orçamentos</div></div>
      <div className="scroll" style={{display:"flex",flexDirection:"column",gap:12}}>
        {D.quotes.map(q=>(
          <div key={q.id} style={{background:"var(--surface-card)",border:"1px solid var(--border-subtle)",borderRadius:"var(--radius-lg)",padding:14,boxShadow:"var(--shadow-sm)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div><div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontFamily:"var(--font-mono)",fontSize:11,fontWeight:700,color:"var(--text-brand)",background:"var(--brand-subtle)",padding:"1px 6px",borderRadius:5}}>{q.number}</span><span style={{fontSize:14,fontWeight:600,color:"var(--text-strong)"}}>{q.clientName}</span></div><div style={{fontSize:12,color:"var(--text-muted)",marginTop:4}}>{q.date} · {q.itemCount} itens</div></div>
              <QuoteStatusBadge status={q.status} size="sm" />
            </div>
            <div style={{display:"flex",justifyContent:"flex-end",marginTop:10,paddingTop:10,borderTop:"1px solid var(--border-subtle)",fontFamily:"var(--font-mono)",fontWeight:700,fontSize:18,color:"var(--text-strong)"}}>R$ {money(q.total)}</div>
          </div>))}
      </div>
    </>
  );

  const screens = { home:<Home/>, clientes:<Clientes/>, orcamentos:<Orcamentos/>, obras:<div className="scroll"><div style={{padding:30,textAlign:"center",color:"var(--text-muted)"}}>Obras</div></div>, perfil:<div className="scroll"><div style={{padding:30,textAlign:"center",color:"var(--text-muted)"}}>Perfil</div></div> };

  return (
    <div className="phone">
      <div className="notch"></div>
      <div className="screen">
        {screens[tab]}
        <div style={{position:"absolute",left:0,right:0,bottom:0}}><BottomNav value={tab} onSelect={setTab} items={[{value:"home",label:"Início",icon:"home"},{value:"clientes",label:"Clientes",icon:"users"},{value:"orcamentos",label:"Orçamentos",icon:"file-text"},{value:"obras",label:"Obras",icon:"hard-hat"},{value:"perfil",label:"Perfil",icon:"user"}]} /></div>
      </div>

      {/* FAB with speed dial */}
      <div style={{position:"absolute",right:16,bottom:80,display:"flex",flexDirection:"column",alignItems:"flex-end",gap:12,zIndex:30}}>
        {fabOpen && [{label:"Orçamento",icon:"file-text",onClick:()=>{setFabOpen(false);setBuilder(true);}},{label:"Obra",icon:"hard-hat"},{label:"Cliente",icon:"user-plus"}].map((a,i)=>(
          <button key={i} onClick={a.onClick} style={{display:"flex",alignItems:"center",gap:10,border:"none",background:"transparent",cursor:"pointer"}}>
            <span style={{fontSize:13,fontWeight:600,color:"var(--text-strong)",background:"var(--surface-card)",padding:"5px 10px",borderRadius:8,boxShadow:"var(--shadow-sm)"}}>{a.label}</span>
            <span style={{width:44,height:44,borderRadius:"50%",background:"var(--surface-card)",border:"1px solid var(--border-subtle)",boxShadow:"var(--shadow-md)",display:"inline-flex",alignItems:"center",justifyContent:"center"}}><Icon name={a.icon} style={{width:20,height:20,color:"var(--brand)"}}></Icon></span>
          </button>))}
        <button onClick={()=>setFabOpen(o=>!o)} style={{width:56,height:56,borderRadius:"50%",border:"none",cursor:"pointer",background:"var(--brand)",color:"#fff",boxShadow:"var(--shadow-lg)",display:"inline-flex",alignItems:"center",justifyContent:"center"}}><Icon name={fabOpen?"x":"plus"} style={{width:26,height:26}}></Icon></button>
      </div>

      {/* Quote builder as bottom-sheet-ish full screen */}
      {builder && (
        <div style={{position:"absolute",inset:0,zIndex:40,background:"var(--surface-page)"}}>
          <div style={{position:"absolute",top:8,left:8,zIndex:2}}>
            <button onClick={()=>setBuilder(false)} style={{width:36,height:36,borderRadius:"50%",border:"none",background:"var(--surface-card)",boxShadow:"var(--shadow-sm)",cursor:"pointer",display:"inline-flex",alignItems:"center",justifyContent:"center"}}><Icon name="arrow-left" style={{width:18,height:18,color:"var(--text-body)"}}></Icon></button>
          </div>
          <MobileQuoteBuilder client={D.clients[0]} work={D.works[0]} items={D.quoteItems} onAddItem={()=>{}} />
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Mobile/>);
</script>
</body>
</html>
