<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;padding:22px;background:var(--surface-card);font-family:var(--font-sans)}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px}
.cell{display:flex;flex-direction:column;align-items:center;gap:7px;color:var(--text-brand)}
.lbl{font-size:11px;color:var(--text-muted);font-family:var(--font-mono)}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Icon } = window.NivelloDesignSystem_c06109;
const set = [["hard-hat","obra"],["drill","perfuração"],["droplet","água"],["waves","poço"],["users","cliente"],["file-text","orçamento"],["calendar-clock","prazo"],["wallet","dinheiro"],["package","material"],["wrench","serviço"],["map-pin","local"],["truck","translado"]];
function Demo(){
  return (<div className="grid">{set.map(([n,l])=>(
    <div className="cell" key={n}><Icon name={n} style={{width:26,height:26}} /><span className="lbl">{l}</span></div>
  ))}</div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body>
</html>
