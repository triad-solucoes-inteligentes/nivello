<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;padding:20px;background:var(--surface-page)}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:16px}.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Button, IconButton, Input, Select, Textarea, DatePicker, SearchBar } = window.NivelloDesignSystem_c06109;
function Demo(){
  const [q,setQ] = React.useState("Poço");
  return (<div>
    <div className="row">
      <Button variant="primary" icon="plus">Novo orçamento</Button>
      <Button variant="secondary" icon="download">Exportar</Button>
      <Button variant="accent" icon="wrench">Material</Button>
      <Button variant="ghost">Cancelar</Button>
      <Button variant="danger" icon="trash-2">Excluir</Button>
      <Button variant="primary" loading>Salvando</Button>
      <Button variant="primary" disabled>Desabilitado</Button>
    </div>
    <div className="row">
      <Button size="sm" variant="secondary">Small</Button>
      <Button size="md" variant="secondary">Medium</Button>
      <Button size="lg" variant="secondary">Large</Button>
      <IconButton icon="pencil" variant="outline" label="Editar" />
      <IconButton icon="more-vertical" variant="ghost" label="Mais" />
      <IconButton icon="check" variant="solid" label="Confirmar" />
      <IconButton icon="trash-2" variant="danger" label="Excluir" />
    </div>
    <div className="grid">
      <Input label="Nome do cliente" value="Kalyleste S.A" icon="user" />
      <Input label="Profundidade" value="100" suffix="m" icon="ruler" />
      <Input label="E-mail" value="" placeholder="email@empresa.com" error="E-mail obrigatório" />
      <Select label="Tipo" value="servico" options={[{value:"servico",label:"Serviço"},{value:"material",label:"Material"}]} />
      <DatePicker label="Prazo de entrega" value="2026-04-16" />
      <SearchBar value={q} onChange={e=>setQ(e.target.value)} onClear={()=>setQ("")} placeholder="Buscar cliente…" />
    </div>
    <div style={{marginTop:14}}>
      <Textarea label="Observações" rows={2} value="Gestão de documentação na prefeitura inclusa no orçamento." />
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
setTimeout(()=>window.lucide && window.lucide.createIcons(), 100);
</script>
</body>
</html>
