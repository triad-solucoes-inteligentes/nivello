<!-- @dsCard group="Components" viewport="700x420" name="Data Display" subtitle="Card, MetricCard, Table, MobileListItem, Avatar, Pagination" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;padding:20px;background:var(--surface-page)}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}.split{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;align-items:start}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const NS = window.NivelloDesignSystem_c06109;
const { Card, MetricCard, Table, MobileListItem, Avatar, Pagination, Badge } = NS;
const money = (n) => "R$ " + n.toLocaleString("pt-BR");
function Demo(){
  const [page,setPage] = React.useState(2);
  const cols = [
    { key:"item", header:"Item" },
    { key:"qtd", header:"Qtd", align:"right", mono:true, width:70 },
    { key:"un", header:"Un", width:60 },
    { key:"unit", header:"P. Unit.", align:"right", mono:true, render:money },
    { key:"total", header:"Total", align:"right", mono:true, render:money },
  ];
  const rows = [
    { id:1, item:"Perfuração solo sedimentário 10\"", qtd:20, un:"m", unit:200000, total:4000000 },
    { id:2, item:"Perfuração em rocha 6 1/8\"", qtd:80, un:"m", unit:230000, total:18400000 },
    { id:3, item:"Tubo PVC 174mm", qtd:20, un:"m", unit:155000, total:3100000 },
  ];
  return (<div>
    <div className="metrics">
      <MetricCard icon="file-text" label="Orçamentos" value="128" delta="+12%" deltaDirection="up" />
      <MetricCard icon="hard-hat" tone="accent" label="Obras em andamento" value="7" />
      <MetricCard icon="users" tone="info" label="Clientes" value="43" delta="+3" deltaDirection="up" />
      <MetricCard icon="wallet" tone="success" label="Valor orçado" value="R$ 1,2" unit="mi" />
    </div>
    <div className="split">
      <Table columns={cols} data={rows} />
      <Card padding="none" title="Clientes recentes">
        <div style={{borderTop:"1px solid var(--border-subtle)"}}>
          <MobileListItem avatar={<Avatar name="Kalyleste S.A" />} title="Kalyleste S.A" subtitle="Monday, Ruta 7 — CDE" trailing={<Badge tone="success" size="sm">Ativo</Badge>} onClick={()=>{}} />
          <MobileListItem avatar={<Avatar name="Formighieri" tone="accent" />} title="Formighieri S.A" subtitle="Avda. Mons. Rodriguez" trailing={<Badge tone="neutral" size="sm">2 obras</Badge>} onClick={()=>{}} />
        </div>
      </Card>
    </div>
    <div style={{marginTop:16,display:"flex",justifyContent:"flex-end"}}>
      <Pagination page={page} totalPages={9} onChange={setPage} />
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
setTimeout(()=>window.lucide && window.lucide.createIcons(), 100);
</script>
</body>
</html>
