<!-- @dsCard group="Colors" viewport="700x150" name="Primária — Aquífero (teal)" subtitle="Água subterrânea, marca. Base 600 = #0C7C93" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>body{margin:0;padding:20px;background:var(--surface-page);font-family:var(--font-sans)}
.scale{display:flex;gap:0;border-radius:10px;overflow:hidden;box-shadow:var(--shadow-sm)}
.sw{flex:1;height:76px;display:flex;align-items:flex-end;padding:6px;box-sizing:border-box}
.n{font-size:10px;font-family:var(--font-mono);font-weight:600}
.cap{margin-top:8px;font-size:12px;color:var(--text-muted)}
b{color:var(--text-brand)}
</style></head>
<body>
<div class="scale">
<div class="sw" style="background:var(--teal-50)"><span class="n" style="color:var(--teal-800)">50</span></div>
<div class="sw" style="background:var(--teal-100)"><span class="n" style="color:var(--teal-800)">100</span></div>
<div class="sw" style="background:var(--teal-200)"><span class="n" style="color:var(--teal-800)">200</span></div>
<div class="sw" style="background:var(--teal-300)"><span class="n" style="color:var(--teal-900)">300</span></div>
<div class="sw" style="background:var(--teal-400)"><span class="n" style="color:#fff">400</span></div>
<div class="sw" style="background:var(--teal-500)"><span class="n" style="color:#fff">500</span></div>
<div class="sw" style="background:var(--teal-600)"><span class="n" style="color:#fff">600</span></div>
<div class="sw" style="background:var(--teal-700)"><span class="n" style="color:#fff">700</span></div>
<div class="sw" style="background:var(--teal-800)"><span class="n" style="color:#fff">800</span></div>
<div class="sw" style="background:var(--teal-900)"><span class="n" style="color:#fff">900</span></div>
<div class="sw" style="background:var(--teal-950)"><span class="n" style="color:#fff">950</span></div>
</div>
<div class="cap"><b>--brand</b> = teal-600. Ações primárias, links, seleção, serviços. <b>--surface-deep</b> = teal-950 (sidebar, faixa de total).</div>
</body></html>
