<!-- @dsCard group="Type" viewport="700x150" name="Números — Geist Mono" subtitle="Tabular para preços, quantidades e tabelas" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>body{margin:0;padding:22px;background:var(--surface-card);font-family:var(--font-sans)}
.big{font-family:var(--font-mono);font-variant-numeric:tabular-nums;font-weight:700;font-size:34px;letter-spacing:-.02em;color:var(--text-strong)}
.cur{font-size:20px;color:var(--text-muted);font-weight:500}
.col{display:flex;flex-direction:column;gap:2px;font-family:var(--font-mono);font-variant-numeric:tabular-nums;font-size:15px;color:var(--text-body);text-align:right}
.wrap{display:flex;gap:48px;align-items:center}
.cap{margin-top:14px;font-size:12px;color:var(--text-muted)}
</style></head>
<body><div class="wrap">
<div><span class="cur">R$</span> <span class="big">33.000.000</span></div>
<div class="col"><span>4.000.000</span><span>18.400.000</span><span>3.100.000</span><span>6.850.000</span></div>
</div>
<div class="cap">Toda coluna de dinheiro/quantidade usa <b>--font-mono</b> + <code>tabular-nums</code> para alinhar dígitos verticalmente — legibilidade financeira sem cara de planilha.</div>
</body></html>
