<!-- @dsCard group="Colors" viewport="700x160" name="Neutros — Aço (slate)" subtitle="Engenharia, texto, superfícies e bordas" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>body{margin:0;padding:20px;background:var(--surface-page);font-family:var(--font-sans)}
.scale{display:flex;border-radius:10px;overflow:hidden;box-shadow:var(--shadow-sm);border:1px solid var(--border-subtle)}
.sw{flex:1;height:70px;display:flex;align-items:flex-end;padding:6px;box-sizing:border-box}
.n{font-size:10px;font-family:var(--font-mono);font-weight:600}
.cap{margin-top:8px;font-size:12px;color:var(--text-muted)}
</style></head>
<body>
<div class="scale">
<div class="sw" style="background:var(--neutral-0)"><span class="n" style="color:var(--neutral-500)">0</span></div>
<div class="sw" style="background:var(--neutral-50)"><span class="n" style="color:var(--neutral-600)">50</span></div>
<div class="sw" style="background:var(--neutral-100)"><span class="n" style="color:var(--neutral-600)">100</span></div>
<div class="sw" style="background:var(--neutral-200)"><span class="n" style="color:var(--neutral-700)">200</span></div>
<div class="sw" style="background:var(--neutral-300)"><span class="n" style="color:var(--neutral-800)">300</span></div>
<div class="sw" style="background:var(--neutral-400)"><span class="n" style="color:#fff">400</span></div>
<div class="sw" style="background:var(--neutral-500)"><span class="n" style="color:#fff">500</span></div>
<div class="sw" style="background:var(--neutral-600)"><span class="n" style="color:#fff">600</span></div>
<div class="sw" style="background:var(--neutral-700)"><span class="n" style="color:#fff">700</span></div>
<div class="sw" style="background:var(--neutral-800)"><span class="n" style="color:#fff">800</span></div>
<div class="sw" style="background:var(--neutral-900)"><span class="n" style="color:#fff">900</span></div>
<div class="sw" style="background:var(--neutral-950)"><span class="n" style="color:#fff">950</span></div>
</div>
<div class="cap">Texto: 900 forte · 700 corpo · 500 mudo · 400 sutil. Superfícies: 0 card · 50 página · 100 rebaixado. Bordas: 200 sutil · 300 padrão.</div>
</body></html>
