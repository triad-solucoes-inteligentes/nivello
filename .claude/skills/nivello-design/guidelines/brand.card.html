<!-- @dsCard group="Brand" viewport="700x200" name="Marca Nivello" subtitle="Wordmark + conceito (nível d'água · precisão · profundidade)" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>body{margin:0;padding:24px;background:var(--surface-page);font-family:var(--font-sans)}
.wrap{display:flex;gap:28px;align-items:center}
.mark{width:66px;height:66px;border-radius:16px;background:linear-gradient(160deg,var(--teal-400),var(--teal-700));display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-md);flex-shrink:0}
.word{font-size:40px;font-weight:700;letter-spacing:-0.03em;color:var(--text-strong)}
.dot{color:var(--terra-500)}
.desc{font-size:13px;color:var(--text-muted);line-height:1.55;max-width:340px;border-left:2px solid var(--brand-border);padding-left:14px}
.chips{display:flex;gap:8px;margin-top:10px}
.chip{font-size:11px;font-weight:600;color:var(--text-brand);background:var(--brand-subtle);padding:3px 9px;border-radius:999px}
</style></head>
<body><div class="wrap">
<div class="mark"><i data-lucide="droplet" style="width:34px;height:34px;color:#fff"></i></div>
<div>
  <div class="word">Nivello<span class="dot">.</span></div>
  <div class="chips"><span class="chip">Precisão</span><span class="chip">Profundidade</span><span class="chip">Confiança</span></div>
</div>
<div class="desc">Do italiano <b>nível</b> — nível d'água, nivelamento e medição precisa. A gota + retângulo remetem a água subterrânea e a um poço perfeitamente aprumado. <b>Sem logo oficial nas fontes</b>: use o wordmark tipográfico até recebermos a marca.</div>
</div>
<script>lucide.createIcons();</script>
</body></html>
