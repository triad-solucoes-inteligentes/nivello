<!-- @dsCard group="Colors" viewport="700x150" name="Acento — Terra (ocre)" subtitle="Solo, perfuração, materiais. Base 500 = #C97A22" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>body{margin:0;padding:20px;background:var(--surface-page);font-family:var(--font-sans)}
.scale{display:flex;border-radius:10px;overflow:hidden;box-shadow:var(--shadow-sm)}
.sw{flex:1;height:76px;display:flex;align-items:flex-end;padding:6px;box-sizing:border-box}
.n{font-size:10px;font-family:var(--font-mono);font-weight:600}
.cap{margin-top:8px;font-size:12px;color:var(--text-muted)}
b{color:var(--terra-700)}
</style></head>
<body>
<div class="scale">
<div class="sw" style="background:var(--terra-50)"><span class="n" style="color:var(--terra-800)">50</span></div>
<div class="sw" style="background:var(--terra-100)"><span class="n" style="color:var(--terra-800)">100</span></div>
<div class="sw" style="background:var(--terra-200)"><span class="n" style="color:var(--terra-800)">200</span></div>
<div class="sw" style="background:var(--terra-300)"><span class="n" style="color:var(--terra-900)">300</span></div>
<div class="sw" style="background:var(--terra-400)"><span class="n" style="color:#fff">400</span></div>
<div class="sw" style="background:var(--terra-500)"><span class="n" style="color:#fff">500</span></div>
<div class="sw" style="background:var(--terra-600)"><span class="n" style="color:#fff">600</span></div>
<div class="sw" style="background:var(--terra-700)"><span class="n" style="color:#fff">700</span></div>
<div class="sw" style="background:var(--terra-800)"><span class="n" style="color:#fff">800</span></div>
<div class="sw" style="background:var(--terra-900)"><span class="n" style="color:#fff">900</span></div>
</div>
<div class="cap"><b>--accent</b> = terra-500. Materiais/insumos, badges de material, destaques secundários. Use com parcimônia — nunca compete com a marca.</div>
</body></html>
