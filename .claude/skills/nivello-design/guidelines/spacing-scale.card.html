<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>body{margin:0;padding:22px;background:var(--surface-card);font-family:var(--font-sans)}
.row{display:flex;align-items:center;gap:12px;margin-bottom:7px}
.bar{height:16px;background:var(--brand);border-radius:3px}
.lbl{font-size:11px;font-family:var(--font-mono);color:var(--text-muted);width:120px}
</style></head>
<body>
<div class="row"><span class="lbl">space-2 · 4</span><span class="bar" style="width:4px"></span></div>
<div class="row"><span class="lbl">space-3 · 8</span><span class="bar" style="width:8px"></span></div>
<div class="row"><span class="lbl">space-5 · 16</span><span class="bar" style="width:16px"></span></div>
<div class="row"><span class="lbl">space-7 · 24</span><span class="bar" style="width:24px"></span></div>
<div class="row"><span class="lbl">space-8 · 32</span><span class="bar" style="width:32px"></span></div>
<div class="row"><span class="lbl">space-10 · 48</span><span class="bar" style="width:48px"></span></div>
<div class="row"><span class="lbl">space-11 · 64</span><span class="bar" style="width:64px"></span></div>
</body></html>
