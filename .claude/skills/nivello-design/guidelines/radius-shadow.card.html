<!-- @dsCard group="Spacing" viewport="700x160" name="Raios & Sombras" subtitle="radius-sm … 2xl · shadow xs … xl" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>body{margin:0;padding:22px;background:var(--surface-page);font-family:var(--font-sans)}
.wrap{display:flex;gap:26px;align-items:flex-end;flex-wrap:wrap}
.grp{display:flex;gap:14px;align-items:flex-end}
.box{width:60px;height:60px;background:var(--surface-card);border:1px solid var(--border-subtle);display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;box-sizing:border-box}
.t{font-size:10px;font-family:var(--font-mono);color:var(--text-muted)}
.div{width:1px;height:60px;background:var(--border-default)}
</style></head>
<body><div class="wrap">
<div class="grp">
<div class="box" style="border-radius:var(--radius-sm)"><span class="t">sm</span></div>
<div class="box" style="border-radius:var(--radius-md)"><span class="t">md</span></div>
<div class="box" style="border-radius:var(--radius-lg)"><span class="t">lg</span></div>
<div class="box" style="border-radius:var(--radius-xl)"><span class="t">xl</span></div>
<div class="box" style="border-radius:var(--radius-2xl)"><span class="t">2xl</span></div>
</div>
<div class="div"></div>
<div class="grp">
<div class="box" style="border:none;box-shadow:var(--shadow-xs);border-radius:10px"><span class="t">xs</span></div>
<div class="box" style="border:none;box-shadow:var(--shadow-sm);border-radius:10px"><span class="t">sm</span></div>
<div class="box" style="border:none;box-shadow:var(--shadow-md);border-radius:10px"><span class="t">md</span></div>
<div class="box" style="border:none;box-shadow:var(--shadow-lg);border-radius:10px"><span class="t">lg</span></div>
<div class="box" style="border:none;box-shadow:var(--shadow-xl);border-radius:10px"><span class="t">xl</span></div>
</div>
</div></body></html>
