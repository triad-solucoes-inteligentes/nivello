name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: project
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: project/package-lock.json

      - run: npm ci

      - run: npm run lint

      # No database is needed at build time (DB access is lazy / per-request).
      - run: npm run build

  docker:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Builds project/Dockerfile and pushes a runnable image. Any container
      # host (Render, Fly, Railway, a VPS, ...) can then pull and run it,
      # providing MONGODB_URI / AUTH_SECRET / GOOGLE_ID / GOOGLE_SECRET as
      # RUNTIME env vars (never baked into the image).
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: project
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/nivello:latest
            ghcr.io/${{ github.repository_owner }}/nivello:${{ github.sha }}
